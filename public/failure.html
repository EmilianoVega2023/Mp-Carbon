<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago fallido — La Esquina</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f7f3ed; font-family: 'Outfit', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fff; border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 420px; width: 100%; box-shadow: 0 4px 40px rgba(0,0,0,0.08); }
  .icon { font-size: 3.5rem; margin-bottom: 20px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #1a1612; margin-bottom: 10px; }
  p { color: #8a7d74; font-size: 0.92rem; line-height: 1.6; margin-bottom: 28px; }
  a { display: inline-block; padding: 12px 28px; background: #c8472b; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: opacity 0.2s; }
  a:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">❌</div>
  <h1>El pago no se completó</h1>
  <p>Hubo un problema con el pago. Podés intentarlo nuevamente o usar otro medio.</p>
  <a href="/">Volver al menú</a>
</div>
</body>
</html>
